# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: Mirror Docker Images

env:
  GITHUB_OWNER: freemankevin
  GHCR_REGISTRY: ghcr.io

on:
  schedule:
    - cron: '30 1 * * *'  # 每天 UTC 01:30 运行（自动保持活跃）
  push:
    branches-ignore:
      - 'dependabot/**'
    tags-ignore:
      - '**'
    paths:
      - 'images-manifest.yml'
      - '.github/workflows/mirror-images.yml'
      - 'scripts/main.py'
      - 'scripts/**'
  pull_request:
    paths:
      - 'images-manifest.yml'
      - '.github/workflows/mirror-images.yml'
      - 'scripts/main.py'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      cleanup:
        description: 'Force cleanup old images'
        required: false
        default: false
        type: boolean

defaults:
  run:
    shell: bash

jobs:
  mirror-docker-images:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    permissions:
      packages: write
      contents: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -q -r scripts/requirements.txt

      - name: Install regclient
        uses: iarekylew00t/regctl-installer@v4

      - name: Login to docker.io
        uses: docker/login-action@v3
        with:
          username: freelabspace
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GITHUB_OWNER }}
          password: ${{ secrets.PAT_TOKEN }}

      - name: Update manifest versions
        id: update
        env:
          GHCR_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "::group::📄 Update image versions"
          python3 scripts/main.py update --max-workers 3 2>&1 | grep -E "^(✓|✗|⚠|🔄|📋|Error|Traceback)" || true
          echo "::endgroup::"
          
          if git diff --quiet images-manifest.yml; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
            echo "📝 Manifest updated"
          fi

      - name: Commit manifest changes
        if: steps.update.outputs.has_updates == 'true'
        run: |
          git add images-manifest.yml
          git commit -m "chore: update image versions [skip ci]"

      - name: Sync mirrors
        id: sync
        env:
          GHCR_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "::group::🚀 Sync images to GHCR"
          python3 scripts/main.py sync --owner ${{ env.GITHUB_OWNER }} --registry ${{ env.GHCR_REGISTRY }} --max-workers 3 --max-retries 5 --retry-delay 5 --continue-on-error
          echo "::endgroup::"
          
          if [ -f images.json ]; then
            success=$(jq -r '.success_count // 0' images.json)
            failed=$(jq -r '.fail_count // 0' images.json)
            echo "success_count=$success" >> $GITHUB_OUTPUT
            echo "fail_count=$failed" >> $GITHUB_OUTPUT
          fi
      
      - name: Cleanup old images
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GHCR_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          echo "::group::🗑️ Cleanup old images"
          python3 scripts/main.py cleanup --owner ${{ env.GITHUB_OWNER }} --force
          echo "::endgroup::"

      - name: Commit sync results
        if: always()
        run: |
          git add images.json || true
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: update sync results [skip ci]"
            # Pull remote changes with rebase before push
            if git pull --rebase origin main; then
              git push -q
            else
              echo "Rebase failed, aborting..."
              git rebase --abort 2>/dev/null || true
              git reset --hard HEAD
            fi
          elif [ -n "$(git log @{u}.. --oneline)" ]; then
            # Pull remote changes with rebase before push
            if git pull --rebase origin main; then
              git push -q
            else
              echo "Rebase failed, aborting..."
              git rebase --abort 2>/dev/null || true
              git reset --hard HEAD
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 Mirror Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Time | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 Manifest Updated | ${{ steps.update.outputs.has_updates }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Successfully Synced | ${{ steps.sync.outputs.success_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${{ steps.sync.outputs.fail_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Registry | ${{ env.GHCR_REGISTRY }}/${{ env.GITHUB_OWNER }} |" >> $GITHUB_STEP_SUMMARY