# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
name: Mirror Docker Images

env:
  GITHUB_OWNER: freemankevin
  GHCR_REGISTRY: ghcr.io

on:
  schedule:
    - cron: '30 1 * * *'  # 每天 UTC 01:30 运行（自动保持活跃）
  push:
    branches-ignore:
      - 'dependabot/**'
    tags-ignore:
      - '**'
    paths:
      - 'images-manifest.yml'
      - '.github/workflows/mirror-images.yml'
      - 'main.py'
      - 'scripts/**'
  pull_request:
    paths:
      - 'images-manifest.yml'
      - '.github/workflows/mirror-images.yml'
      - 'main.py'
      - 'scripts/**'
  workflow_dispatch:

defaults:
  run:
    shell: bash

jobs:
  mirror-docker-images:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      packages: write
      contents: write

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install regclient
        uses: iarekylew00t/regctl-installer@v4

      - name: Login to docker.io
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Login to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GHCR_REGISTRY }}
          username: ${{ env.GITHUB_OWNER }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to quay.io (optional)
        uses: docker/login-action@v3
        if: secrets.QUAY_USERNAME != ''
        continue-on-error: true
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USERNAME }}
          password: ${{ secrets.QUAY_TOKEN }}

      - name: Update manifest versions
        id: update
        run: |
          echo "🔄 检查并更新镜像版本..."
          python3 main.py update --max-workers 3

          # 检查清单是否有更新
          if git diff --quiet images-manifest.yml; then
            echo "has_updates=false" >> $GITHUB_OUTPUT
          else
            echo "has_updates=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit manifest changes
        if: steps.update.outputs.has_updates == 'true'
        run: |
          git add images-manifest.yml
          git commit -m "chore: update image versions [skip ci]"
          echo "✅ Manifest changes committed"

      - name: Sync mirrors
        id: sync
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🚀 开始同步镜像..."
          python3 main.py --debug sync --owner ${{ env.GITHUB_OWNER }} --registry ${{ env.GHCR_REGISTRY }} --max-workers 2 --max-retries 5 --retry-delay 3

          # 提取同步统计
          if [ -f images.json ]; then
            success=$(jq -r '.success_count // 0' images.json)
            failed=$(jq -r '.fail_count // 0' images.json)
            echo "success_count=$success" >> $GITHUB_OUTPUT
            echo "fail_count=$failed" >> $GITHUB_OUTPUT
          fi

      - name: Commit sync results
        if: success()
        run: |
          git add images.json || true
          
          if ! git diff --staged --quiet; then
            git commit -m "chore: update sync results [skip ci]"
            git push
            echo "✅ Changes pushed"
          else
            # 如果只有清单更新，推送它
            if [ -n "$(git log @{u}.. --oneline)" ]; then
              git push
              echo "✅ Manifest changes pushed"
            else
              echo "📝 No changes to push"
            fi
          fi

      - name: Summary
        if: always()
        run: |
          echo "## 🎉 Mirror Sync Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🕐 Time | $(date -u +'%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "| 📄 Manifest Updated | ${{ steps.update.outputs.has_updates }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ✅ Successfully Synced | ${{ steps.sync.outputs.success_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| ❌ Failed | ${{ steps.sync.outputs.fail_count || '0' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔗 Registry | ${{ env.GHCR_REGISTRY }}/${{ env.GITHUB_OWNER }} |" >> $GITHUB_STEP_SUMMARY