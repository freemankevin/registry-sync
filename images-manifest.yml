images:
- source: public.ecr.aws/amazoncorretto/amazoncorretto:8-al2023
  enabled: true
  description: Amazon Corretto JDK (Amazon Linux 2023)
  tag_pattern: ^(8|11|17|21|25)-al2023$
  sync_all_matching: true
  retention:
    strategy: latest_per_major
    major_versions:
    - 8
    - 11
    - 17
    - 21
    - 25
- source: library/elasticsearch:9.3.3
  enabled: true
  description: Distributed, RESTful search and analytics engine
  tag_pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
  sync_all_matching: false
- source: nacos/nacos-server:v3.2.1
  enabled: true
  description: Dynamic service discovery, configuration and service management
  tag_pattern: ^v[0-9]+\.[0-9]+\.[0-9]+$
  exclude_pattern: .*BETA.*|.*RC.*|.*SNAPSHOT.*
  sync_all_matching: false
- source: library/nginx:1.30.0-alpine
  enabled: true
  description: High-performance HTTP server and reverse proxy
  tag_pattern: ^[0-9]+\.[0-9]+\.[0-9]+-alpine$
  sync_all_matching: false
- source: library/rabbitmq:4.3.0-management-alpine
  enabled: true
  description: Message broker with management plugin
  tag_pattern: ^[0-9]+\.[0-9]+\.[0-9]+-management-alpine$
  sync_all_matching: false
  retention:
    max_versions: 5
- source: library/redis:8.6.2
  enabled: true
  description: In-memory data structure store
  tag_pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
  exclude_pattern: .*bookworm.*|.*bullseye.*|.*alpine.*
  sync_all_matching: false
- source: kartoza/geoserver:2.28.3
  enabled: true
  description: Open-source geospatial data server
  tag_pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
  exclude_pattern: .*--.*
  sync_all_matching: false
  retention:
    strategy: latest_per_minor
    keep_minor_versions:
    - 2.28
- source: ghcr.io/freemankevin/postgresql-postgis:18.3
  enabled: true
  description: PostgreSQL database with PostGIS spatial extension
  tag_pattern: ^(1[4-8])\.[0-9]+$
  exclude_pattern: ^buildcache-.*
  sync_all_matching: true
  version_range: 14.x-18.x
  retention:
    strategy: latest_per_major
    major_versions:
    - 14
    - 15
    - 16
    - 17
    - 18
- source: ghcr.io/freemankevin/postgresql-backup:latest
  enabled: true
  description: Backup utility for PostgreSQL databases
  tag_pattern: ^latest$|^[0-9]+\.[0-9]+$
  exclude_pattern: ^buildcache-.*
  sync_all_matching: false
  retention:
    max_versions: 10
- source: freelabspace/harbor-export:latest
  enabled: true
  description: Harbor registry metrics exporter
  tag_pattern: ^latest$
  sync_all_matching: false
- source: freelabspace/harbor-export-ui:latest
  enabled: true
  description: Harbor registry metrics exporter UI
  tag_pattern: ^latest$
  sync_all_matching: false
- source: freelabspace/java-local:8-amd64
  enabled: true
  description: Java development environment with common tools
  tag_pattern: ^[0-9]+(-amd64|-arm64)?$
  sync_all_matching: false
- source: freelabspace/python-local:3.10-amd64
  enabled: true
  description: Python development environment with PyTorch
  tag_pattern: ^[0-9]+\.[0-9]+(-amd64|-arm64)?$
  sync_all_matching: false
- source: ghcr.io/freemankevin/netkit:latest
  enabled: true
  description: Network diagnostic tools for containerized environments including curl,
    wget, ping, nslookup, dig, telnet, nc, tcpdump
  tag_pattern: ^latest$|^[0-9]+\.[0-9]+$
  sync_all_matching: false
- source: ghcr.io/freemankevin/freemankevin:latest
  enabled: true
  description: Personal GitHub Pages site container
  tag_pattern: ^latest$
  sync_all_matching: false
- source: gcr.io/google-containers/etcd:3.4.9
  enabled: true
  description: Distributed reliable key-value store
  tag_pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
  exclude_pattern: .*-alpha.*|.*-beta.*|.*-rc.*
  sync_all_matching: false
- source: quay.io/minio/aistor/minio:RELEASE.2026-04-14T21-32-45Z
  enabled: true
  description: MinIO AIStor - High-performance object storage for AI workloads
  tag_pattern: ^RELEASE\.[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}-[0-9]{2}-[0-9]{2}Z$
  sync_all_matching: false
config:
  registry: ghcr.io
  owner: freemankevin
  check_exist: true
  update_index: true
  retention:
    strategy: max_versions
    max_versions: 3
    cleanup_old_versions: true
  last_checked: '2026-04-29T04:57:42.825733+00:00'
